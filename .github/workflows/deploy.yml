name: Manual Release

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'ADO Release Work Item ID (e.g., 456)'
        required: true
      target_env:
        description: 'Target Environment'
        type: choice
        options: [Production, Staging]
        default: 'Production'

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy:
    name: Deploy and Summarize
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Generate AI Release Summary
        id: ai
        env:
          # Use both to ensure the CLI and the API are satisfied
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags --force
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          # Set instruction based on history
          if [ -z "$LAST_TAG" ]; then
            INSTRUCTION="Summarize the last 5 commits in this repo into 3 bullet points for a project manager."
          else
            INSTRUCTION="Summarize changes between $LAST_TAG and HEAD into 3 bullet points for a project manager."
          fi

          echo "Requesting summary from Copilot..."

          # We use the 'explain' command with the --prompt flag.
          # To prevent the 'silent fail', we disable the interactive update check
          # and force the output to a temporary file.
          gh config set prompt disabled
          
          gh copilot explain -p "$INSTRUCTION" > raw_summary.txt 2>&1 || echo "CLI encountered an error" > raw_summary.txt

          # Clean the output: Remove installation messages and metadata
          # This ensures only the AI's words reach ADO
          CLEAN_SUMMARY=$(grep -v "Copilot CLI" raw_summary.txt | grep -v "installed successfully" | grep -v "Checking for updates" | sed '/^$/d')

          if [ -z "$CLEAN_SUMMARY" ]; then
            CLEAN_SUMMARY="Automated summary could not be generated. Please review PRs manually."
          fi

          {
            echo 'AI_SUMMARY<<EOF'
            echo "$CLEAN_SUMMARY"
            echo 'EOF'
          } >> "$GITHUB_ENV"
      - name: Sync to Azure DevOps
        if: success()
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG_URL: ${{ secrets.ADO_ORG_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = "${{ github.event.inputs.release_id }}";
            const summary = process.env.AI_SUMMARY;
            const orgUrl = process.env.ADO_ORG_URL;
            const pat = process.env.ADO_PAT;
            const auth = Buffer.from(`:${pat}`).toString('base64');
            
            const commentBody = {
              text: `### Deployment Successful\n\n**Environment:** ${{ github.event.inputs.target_env }}\n**Triggered By:** ${context.actor}\n\n**AI Summary of Changes:**\n${summary}\n\n*View deployment in [GitHub Actions](${context.payload.repository.html_url}/actions/runs/${context.runId})*`
            };

            try {
              const response = await fetch(`${orgUrl}/_apis/wit/workitems/${releaseId}/comments?api-version=7.0-preview.3`, {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${auth}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify(commentBody)
              });

              if (!response.ok) throw new Error(`ADO API Error: ${response.status}`);
              console.log("Successfully updated ADO Release Item.");
            } catch (err) {
              core.setFailed(`Failed to update ADO: ${err.message}`);
            }
