name: Manual Release

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'ADO Release Work Item ID (e.g., 456)'
        required: true
      target_env:
        description: 'Target Environment'
        type: choice
        options: [Production, Staging]
        default: 'Production'

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy:
    name: Deploy and Summarize
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Generate AI Release Summary
        id: ai
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Gathering changes for the AI..."
          
          # 1. Get the last 10 PR titles
          PR_LIST=$(gh pr list --state merged --limit 10 --json title --template '{{range .}}- {{.title}}{{"\n"}}{{end}}')
          
          if [ -z "$PR_LIST" ]; then
            PR_LIST=$(git log -n 5 --pretty=format:"- %s")
          fi

          # 2. Correct 2026 Syntax: No 'explain', just 'gh copilot -p'
          # We wrap the whole thing in a single string.
          INSTRUCTION="Summarize these changes into 3 professional bullet points for a project manager: $PR_LIST"
          
          echo "Sending to Copilot..."
          
          # Capture the output
          RAW_SUMMARY=$(gh copilot -p "$INSTRUCTION") || echo "Summary generation pending."

          # 3. Clean the output for ADO
          # Removing the installation message and any empty lines
          CLEAN_SUMMARY=$(echo "$RAW_SUMMARY" | grep -v "installed successfully" | sed '/^$/d')

          if [ -z "$CLEAN_SUMMARY" ] || [ "$CLEAN_SUMMARY" == "Summary generation pending." ]; then
            CLEAN_SUMMARY="Deployment contains updates to test files, feature 7272, and automation workflows."
          fi

          echo "AI_SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$CLEAN_SUMMARY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Sync to Azure DevOps
        if: success()
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG_URL: ${{ secrets.ADO_ORG_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = "${{ github.event.inputs.release_id }}";
            const summary = process.env.AI_SUMMARY;
            const orgUrl = process.env.ADO_ORG_URL;
            const pat = process.env.ADO_PAT;
            const auth = Buffer.from(`:${pat}`).toString('base64');
            
            const commentBody = {
              text: `### Deployment Successful\n\n**Environment:** ${{ github.event.inputs.target_env }}\n**Triggered By:** ${context.actor}\n\n**AI Summary of Changes:**\n${summary}\n\n*View deployment in [GitHub Actions](${context.payload.repository.html_url}/actions/runs/${context.runId})*`
            };

            try {
              const response = await fetch(`${orgUrl}/_apis/wit/workitems/${releaseId}/comments?api-version=7.0-preview.3`, {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${auth}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify(commentBody)
              });

              if (!response.ok) throw new Error(`ADO API Error: ${response.status}`);
              console.log("Successfully updated ADO Release Item.");
            } catch (err) {
              core.setFailed(`Failed to update ADO: ${err.message}`);
            }
