name: Manual Release

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'ADO Release Work Item ID (e.g., 456)'
        required: true
      target_env:
        description: 'Target Environment'
        type: choice
        options: [Production, Staging]
        default: 'Production'

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy:
    name: Deploy and Summarize
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Generate AI Release Summary
        id: ai
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags --force
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          echo "Generating summary..."

          # Using the 2026 'summarize' command which is built for automation.
          # We compare the last tag to the current HEAD.
          if [ -z "$LAST_TAG" ]; then
            # If no tags, summarize the last 10 commits
            gh copilot summarize HEAD~10..HEAD > summary.txt || echo "Summary failed" > summary.txt
          else
            # Summarize the diff between the last release and now
            gh copilot summarize $LAST_TAG..HEAD > summary.txt || echo "Summary failed" > summary.txt
          fi
          
          # Load the file into the environment variable
          {
            echo 'AI_SUMMARY<<EOF'
            cat summary.txt
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Sync to Azure DevOps
        if: success()
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG_URL: ${{ secrets.ADO_ORG_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = "${{ github.event.inputs.release_id }}";
            const summary = process.env.AI_SUMMARY;
            const orgUrl = process.env.ADO_ORG_URL;
            const pat = process.env.ADO_PAT;
            const auth = Buffer.from(`:${pat}`).toString('base64');
            
            const commentBody = {
              text: `### Deployment Successful\n\n**Environment:** ${{ github.event.inputs.target_env }}\n**Triggered By:** ${context.actor}\n\n**AI Summary of Changes:**\n${summary}\n\n*View deployment in [GitHub Actions](${context.payload.repository.html_url}/actions/runs/${context.runId})*`
            };

            try {
              const response = await fetch(`${orgUrl}/_apis/wit/workitems/${releaseId}/comments?api-version=7.0-preview.3`, {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${auth}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify(commentBody)
              });

              if (!response.ok) throw new Error(`ADO API Error: ${response.status}`);
              console.log("Successfully updated ADO Release Item.");
            } catch (err) {
              core.setFailed(`Failed to update ADO: ${err.message}`);
            }
