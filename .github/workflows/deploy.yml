name: Manual Release

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'ADO Release Work Item ID (e.g., 456)'
        required: true
      target_env:
        description: 'Target Environment'
        type: choice
        options: [Production, Staging]
        default: 'Production'

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy:
    name: Deploy and Summarize
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 1. Ensure the binary is installed
      - name: Install GitHub Copilot CLI
        run: npm i -g @github/copilot

      # 2. Run with the "Agentic" Configuration
      - name: Generate AI Traceability Summary
        id: ai
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_RELEASE_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LANG: en_US.UTF-8
        run: |
          set -euo pipefail
          
          # 1. Get the Boundary
          git fetch --tags --force
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          # 2. Get PRs merged since the last tag
          # We use a date-based search to be safer across branches
          if [ -n "$LAST_TAG" ]; then
            SINCE_DATE=$(git log -1 --format=%aI $LAST_TAG)
            PR_JSON=$(gh pr list --state merged --search "merged:>$SINCE_DATE" --json number,title,body)
          else
            PR_JSON=$(gh pr list --state merged --limit 5 --json number,title,body)
          fi

          # Check if PR_JSON is empty or just an empty array []
          if [ -z "$PR_JSON" ] || [ "$PR_JSON" == "[]" ]; then
            echo "No PRs found since last tag."
            echo "AI_SUMMARY=• No new PRs identified since last release." >> "$GITHUB_ENV"
            echo "WORK_ITEM_IDS=" >> "$GITHUB_ENV"
            exit 0
          fi

          # 3. Extract Work Items (AB#IDs)
          # Use grep -o and ensure we don't fail if none are found
          WORK_ITEM_IDS=$(echo "$PR_JSON" | grep -o 'AB#[0-9]\+' | sed 's/AB#//' | sort -u | tr '\n' ',' | sed 's/,$//' || echo "")
          echo "Found Work Items: $WORK_ITEM_IDS"
          echo "WORK_ITEM_IDS=$WORK_ITEM_IDS" >> "$GITHUB_ENV"

          # 4. Create AI Context
          # Use jq safely
          AGENT_CONTEXT=$(echo "$PR_JSON" | jq -r '.[] | "PR #\(.number): \(.title) | \(.body)"' | tr -d '"')

          # 5. Autopilot Prompt
          PROMPT="For each PR provided, write a one-sentence summary of its production impact.
          Format: - PR #NUMBER: [Summary]
          
          Context:
          $AGENT_CONTEXT"

          # Use || true to prevent exit code 1 from the binary if it has a warning
          copilot -p "$PROMPT" --autopilot --allow-all-tools --no-auto-update > raw_output.txt 2>&1 || true
          
          # Extract the lines starting with '- PR #'
          CLEAN_SUMMARY=$(grep -E "^- PR #[0-9]+" raw_output.txt | sed 's/^[[:space:]]*//' || echo "")

          if [ -z "$CLEAN_SUMMARY" ]; then
             CLEAN_SUMMARY=$(echo "$PR_JSON" | jq -r '.[] | "- PR #\(.number): \(.title)"')
          fi

          {
            echo 'AI_SUMMARY<<EOF'
            echo "$CLEAN_SUMMARY"
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Link Work Items in ADO
        if: env.WORK_ITEM_IDS != ''
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
          WORK_ITEM_IDS: ${{ env.WORK_ITEM_IDS }}
          ADO_ORG_URL: ${{ secrets.ADO_ORG_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = "${{ github.event.inputs.release_id }}";
            const ids = process.env.WORK_ITEM_IDS.split(',').filter(x => x);
            const auth = Buffer.from(`:${process.env.ADO_PAT}`).toString('base64');
            
            for (const id of ids) {
              const url = `${process.env.ADO_ORG_URL}/_apis/wit/workitems/${releaseId}/?api-version=7.0`;
              
              // Changed rel to 'System.LinkTypes.Related' to avoid hierarchy conflicts
              const body = [{
                "op": "add",
                "path": "/relations/-",
                "value": {
                  "rel": "System.LinkTypes.Related",
                  "url": `${process.env.ADO_ORG_URL}/_apis/wit/workitems/${id}`,
                  "attributes": { "comment": "Linked via GitHub AI Release Automation" }
                }
              }];

              try {
                const response = await fetch(url, {
                  method: 'PATCH',
                  headers: { 
                    'Authorization': `Basic ${auth}`, 
                    'Content-Type': 'application/json-patch+json' 
                  },
                  body: JSON.stringify(body)
                });
                
                if (!response.ok) {
                   const error = await response.text();
                   console.log(`Failed to link AB#${id}: ${error}`);
                } else {
                   console.log(`Successfully linked AB#${id}`);
                }
              } catch (e) {
                console.log(`Error linking AB#${id}: ${e.message}`);
              }
            }
      - name: Sync to Azure DevOps
        if: success()
        env:
          AI_SUMMARY: ${{ env.AI_SUMMARY }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG_URL: ${{ secrets.ADO_ORG_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = "${{ github.event.inputs.release_id }}";
            const summary = process.env.AI_SUMMARY || "No summary available.";
            const orgUrl = process.env.ADO_ORG_URL;
            const pat = process.env.ADO_PAT;
            const auth = Buffer.from(`:${pat}`).toString('base64');
            
            const cleanOrgUrl = orgUrl.replace(/\/$/, "");
            const apiUrl = `${cleanOrgUrl}/_apis/wit/workitems/${releaseId}/comments?api-version=7.0-preview.3`;
            
            const htmlContent = `<div>
              <h3 style="color: #0078d4; margin-bottom: 5px;">Deployment Successful</h3>
              <p style="margin-top: 0;"><b>Environment:</b> Production<br>
              <b>Triggered By:</b> ${context.actor}</p>
              <p><b>AI Summary of Changes:</b><br>
              ${summary.replace(/\n/g, '<br>')}</p>
              <hr style="border: 0; border-top: 1px solid #eee;">
              <p style="font-size: 11px; color: #666;">View deployment in <a href="${context.payload.repository.html_url}/actions/runs/${context.runId}">GitHub Actions</a></p>
            </div>`;

            try {
              await fetch(apiUrl, {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${auth}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text: htmlContent })
              });
              console.log("Successfully updated ADO.");
            } catch (err) {
              console.error("Failed to update ADO:", err.message);
            }
