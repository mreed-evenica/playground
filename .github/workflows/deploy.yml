name: Manual Release

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'ADO Release Work Item ID (e.g., 456)'
        required: true
      target_env:
        description: 'Target Environment'
        type: choice
        options: [Production, Staging]
        default: 'Production'

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy:
    name: Deploy and Summarize
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Generate AI Release Summary
        id: ai
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Fetch tags to ensure comparison baseline
          git fetch --tags --force
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            PROMPT="Summarize all commits in this repository into a 3-bullet point list for a project manager. Focus on business value."
          else
            PROMPT="Summarize all changes between $LAST_TAG and HEAD into a 3-bullet point list for a project manager. Focus on business value."
          fi

          # 2. Force the 'Yes' confirmation through a pipe
          # The 'yes' command continuously sends 'y' to the CLI to bypass prompts
          RAW_SUMMARY=$(yes | gh copilot -p "$PROMPT")
          
          # 3. Clean the output (Copilot CLI sometimes adds terminal headers)
          # We remove lines starting with '?' or '✓' to keep it professional for ADO
          CLEAN_SUMMARY=$(echo "$RAW_SUMMARY" | grep -v '?' | grep -v '✓' | sed '1,2d')

          if [ -z "$CLEAN_SUMMARY" ]; then
            CLEAN_SUMMARY="Automated summary generation returned no results."
          fi

          echo "AI_SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$CLEAN_SUMMARY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Sync to Azure DevOps
        if: success()
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG_URL: ${{ secrets.ADO_ORG_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = "${{ github.event.inputs.release_id }}";
            const summary = process.env.AI_SUMMARY;
            const orgUrl = process.env.ADO_ORG_URL;
            const pat = process.env.ADO_PAT;
            const auth = Buffer.from(`:${pat}`).toString('base64');
            
            const commentBody = {
              text: `### Deployment Successful\n\n**Environment:** ${{ github.event.inputs.target_env }}\n**Triggered By:** ${context.actor}\n\n**AI Summary of Changes:**\n${summary}\n\n*View deployment in [GitHub Actions](${context.payload.repository.html_url}/actions/runs/${context.runId})*`
            };

            try {
              const response = await fetch(`${orgUrl}/_apis/wit/workitems/${releaseId}/comments?api-version=7.0-preview.3`, {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${auth}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify(commentBody)
              });

              if (!response.ok) throw new Error(`ADO API Error: ${response.status}`);
              console.log("Successfully updated ADO Release Item.");
            } catch (err) {
              core.setFailed(`Failed to update ADO: ${err.message}`);
            }
