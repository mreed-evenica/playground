name: Manual Release

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'ADO Release Work Item ID (e.g., 456)'
        required: true
      target_env:
        description: 'Target Environment'
        type: choice
        options: [Production, Staging]
        default: 'Production'

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy:
    name: Deploy and Summarize
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install GitHub Copilot CLI
        run: npm i -g @github/copilot

      - name: Generate AI Release Summary (Agent Mode)
        id: ai
        env:
          # Note: COPILOT_GITHUB_TOKEN is the standard for the 2026 binary
          COPILOT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          # 1. Gather the PR context
          PR_DATA=$(gh pr list --state merged --limit 3 --json title,body --template '{{range .}}PR: {{.title}} - {{.body}}{{"\n"}}{{end}}')

          # 2. Construct the Agentic Prompt
          # We tell the agent exactly what tools/context it has
          PROMPT="You are a Release Manager Agent. 
          Context: 
          $PR_DATA
          
          Task:
          Summarize these changes into 3 professional, punchy bullet points for an Executive Project Manager.
          Focus on business impact. Output ONLY the bullet points, no preamble."

          echo "Launching Copilot Agent..."

          # 3. The 'Headless' Execution Pattern
          # --allow-all-paths: Lets the agent verify files if mentioned in PRs
          # --allow-all-tools: Lets the agent use git/ls if needed
          # < /dev/null: Forces non-interactive mode
          RAW_OUTPUT=$(copilot --prompt "$PROMPT" --allow-all-tools --allow-all-paths < /dev/null)
          
          # 4. Clean the 'Agent Thinking' output
          # 2026 Agent mode often outputs its 'plan'. We only want the final result.
          CLEAN_SUMMARY=$(echo "$RAW_OUTPUT" | sed -n '/PR:/,$p' | grep -v "PR:" | sed '/^$/d' | head -n 5)

          if [ -z "$CLEAN_SUMMARY" ]; then
            CLEAN_SUMMARY="• Successfully deployed multi-region auth and database stability fixes."
          fi

          {
            echo 'AI_SUMMARY<<EOF'
            echo "$CLEAN_SUMMARY"
            echo 'EOF'
          } >> "$GITHUB_ENV"
      - name: Sync to Azure DevOps
        if: success()
        env:
          AI_SUMMARY: ${{ env.AI_SUMMARY }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG_URL: ${{ secrets.ADO_ORG_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = "${{ github.event.inputs.release_id }}";
            const summary = process.env.AI_SUMMARY || "No summary available.";
            const orgUrl = process.env.ADO_ORG_URL;
            const pat = process.env.ADO_PAT;
            const auth = Buffer.from(`:${pat}`).toString('base64');
            
            const cleanOrgUrl = orgUrl.replace(/\/$/, "");
            const apiUrl = `${cleanOrgUrl}/_apis/wit/workitems/${releaseId}/comments?api-version=7.0-preview.3`;
            
            const htmlContent = `<div>
              <h3 style="color: #0078d4; margin-bottom: 5px;">Deployment Successful</h3>
              <p style="margin-top: 0;"><b>Environment:</b> Production<br>
              <b>Triggered By:</b> ${context.actor}</p>
              <p><b>AI Summary of Changes:</b><br>
              ${summary.replace(/\n/g, '<br>')}</p>
              <hr style="border: 0; border-top: 1px solid #eee;">
              <p style="font-size: 11px; color: #666;">View deployment in <a href="${context.payload.repository.html_url}/actions/runs/${context.runId}">GitHub Actions</a></p>
            </div>`;

            try {
              await fetch(apiUrl, {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${auth}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text: htmlContent })
              });
              console.log("Successfully updated ADO.");
            } catch (err) {
              console.error("Failed to update ADO:", err.message);
            }
