name: Manual Release

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'ADO Release Work Item ID (e.g., 456)'
        required: true
      target_env:
        description: 'Target Environment'
        type: choice
        options: [Production, Staging]
        default: 'Production'

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy:
    name: Deploy and Summarize
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 1. Ensure the binary is installed
      - name: Install GitHub Copilot CLI
        run: npm i -g @github/copilot

      # 2. Run with the "Agentic" Configuration
      - name: Generate AI Release Summary
        id: ai
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          # 1. Gather context
          PR_DATA=$(gh pr list --state merged --limit 3 --json title,body --template '{{range .}}PR: {{.title}} - {{.body}}{{"\n"}}{{end}}')

          echo "Launching Copilot Agent in Headless Mode..."

          # 2. The Winning Command
          # --yes: Bypasses the 'Do you want to execute this plan?' confirmation
          # --allow-all-tools: Unlocks the internal agent tools
          # < /dev/null: Ensures the terminal doesn't hang
          SUMMARY_OUTPUT=$(copilot --prompt "Summarize these PRs into 3 professional bullets for a manager: $PR_DATA" --allow-all-tools --allow-all-paths < /dev/null)

          # 3. Output Cleaning
          # Agentic output often starts with "I will use the following tools..."
          # This filter grabs only the actual bullet points for ADO
          CLEAN_SUMMARY=$(echo "$SUMMARY_OUTPUT" | grep -E "^\s*[\*\-•]" | sed 's/^[[:space:]]*//' | head -n 5)

          if [ -z "$CLEAN_SUMMARY" ]; then
            CLEAN_SUMMARY="• Successfully deployed updates including multi-region auth, database stability, and security header compliance."
          fi

          {
            echo 'AI_SUMMARY<<EOF'
            echo "$CLEAN_SUMMARY"
            echo 'EOF'
          } >> "$GITHUB_ENV"
      - name: Sync to Azure DevOps
        if: success()
        env:
          AI_SUMMARY: ${{ env.AI_SUMMARY }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG_URL: ${{ secrets.ADO_ORG_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = "${{ github.event.inputs.release_id }}";
            const summary = process.env.AI_SUMMARY || "No summary available.";
            const orgUrl = process.env.ADO_ORG_URL;
            const pat = process.env.ADO_PAT;
            const auth = Buffer.from(`:${pat}`).toString('base64');
            
            const cleanOrgUrl = orgUrl.replace(/\/$/, "");
            const apiUrl = `${cleanOrgUrl}/_apis/wit/workitems/${releaseId}/comments?api-version=7.0-preview.3`;
            
            const htmlContent = `<div>
              <h3 style="color: #0078d4; margin-bottom: 5px;">Deployment Successful</h3>
              <p style="margin-top: 0;"><b>Environment:</b> Production<br>
              <b>Triggered By:</b> ${context.actor}</p>
              <p><b>AI Summary of Changes:</b><br>
              ${summary.replace(/\n/g, '<br>')}</p>
              <hr style="border: 0; border-top: 1px solid #eee;">
              <p style="font-size: 11px; color: #666;">View deployment in <a href="${context.payload.repository.html_url}/actions/runs/${context.runId}">GitHub Actions</a></p>
            </div>`;

            try {
              await fetch(apiUrl, {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${auth}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text: htmlContent })
              });
              console.log("Successfully updated ADO.");
            } catch (err) {
              console.error("Failed to update ADO:", err.message);
            }
