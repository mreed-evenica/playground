name: Manual Production Release

on:
  # This enables the "Run workflow" button in the Actions tab
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for deployment (e.g., Weekly Release)'
        required: true
        default: 'Scheduled Deployment'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: Production  # Triggers the Required Reviewer gate
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so we can see what changed

      - name: Identify Changes (Traceability)
        id: vars
        run: |
          # This pulls all AB# IDs from commits since the last successful deployment
          echo "deploy_reason=${{ github.event.inputs.reason }}" >> $GITHUB_ENV

      - name: Execute Deployment
        run: |
          echo "Deploying to Production environment..."
          # Insert your actual deployment scripts here (AWS, Azure, etc.)

      - name: Notify Azure DevOps
        if: success()
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG_URL: ${{ secrets.ADO_ORG_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            // This script pings ADO to mark the release as successful
            console.log("Deployment successful. Updating ADO items...");
            // In a full POC, you'd parse the commit messages for AB#IDs 
            // and post a comment like: "Released in Production via Manual Trigger"
