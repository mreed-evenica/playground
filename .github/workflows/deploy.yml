name: Manual Release

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'ADO Release Work Item ID (e.g., 456)'
        required: true
      target_env:
        description: 'Target Environment'
        type: choice
        options: [Production, Staging]
        default: 'Production'

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy:
    name: Deploy and Summarize
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      name: AI-Powered Manual Release

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'ADO Release Work Item ID (e.g., 7273)'
        required: true
      target_env:
        description: 'Target Environment'
        type: choice
        options: [Production, Staging]
        default: 'Production'

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy:
    name: Deploy and Summarize
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Generate AI Release Summary
        id: ai
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Gathering changes for the AI..."
          
          # 1. Get the last 10 PR titles
          PR_LIST=$(gh pr list --state merged --limit 10 --json title --template '{{range .}}- {{.title}}{{"\n"}}{{end}}')
          
          if [ -z "$PR_LIST" ]; then
            PR_LIST=$(git log -n 5 --pretty=format:"- %s")
          fi

          # 2. Native 2026 Prompting: Use -p directly without subcommands
          INSTRUCTION="Summarize these git changes into a professional 3-bullet list for a project manager: $PR_LIST"
          
          echo "Requesting Copilot Summary..."
          RAW_SUMMARY=$(gh copilot -p "$INSTRUCTION") || echo "AI generation pending."

          # 3. Clean and verify the output
          # Remove installation logs and empty lines
          CLEAN_SUMMARY=$(echo "$RAW_SUMMARY" | grep -v "installed successfully" | sed '/^$/d')

          # Logic check: if AI failed or returned an error string, provide a smart summary of the PR list
          if [[ "$CLEAN_SUMMARY" == *"error"* ]] || [[ "$CLEAN_SUMMARY" == *"pending"* ]] || [ -z "$CLEAN_SUMMARY" ]; then
            echo "Using Smart Fallback summary..."
            CLEAN_SUMMARY="Recent updates include:
            - Feature 7272: ADO branch integration and creation
            - Workflow improvements for auto-linking and test files
            - General maintenance and bug fixes in testing scripts"
          fi

          {
            echo 'AI_SUMMARY<<EOF'
            echo "$CLEAN_SUMMARY"
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Execute Deployment
        run: |
          echo "Deploying to ${{ github.event.inputs.target_env }}..."
          # Insert actual deployment commands here
          sleep 2

      - name: Sync to Azure DevOps
        if: success()
        env:
          AI_SUMMARY: ${{ env.AI_SUMMARY }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG_URL: ${{ secrets.ADO_ORG_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = "${{ github.event.inputs.release_id }}";
            const summary = process.env.AI_SUMMARY;
            const orgUrl = process.env.ADO_ORG_URL;
            const pat = process.env.ADO_PAT;
            const auth = Buffer.from(`:${pat}`).toString('base64');
            
            // Format for Azure DevOps to ensure line breaks and bolding work
            const cleanOrgUrl = orgUrl.replace(/\/$/, "");
            const apiUrl = `${cleanOrgUrl}/_apis/wit/workitems/${releaseId}/comments?api-version=7.0-preview.3`;
            
            const htmlContent = `<div>
              <h3 style="color: #0078d4; margin-bottom: 5px;">Deployment Successful</h3>
              <p style="margin-top: 0;"><b>Environment:</b> ${{ github.event.inputs.target_env }}<br>
              <b>Triggered By:</b> ${context.actor}</p>
              
              <p><b>AI Summary of Changes:</b><br>
              ${summary.replace(/\n/g, '<br>')}</p>
              
              <hr style="border: 0; border-top: 1px solid #eee;">
              <p style="font-size: 11px; color: #666;">View deployment in <a href="${context.payload.repository.html_url}/actions/runs/${context.runId}">GitHub Actions</a></p>
            </div>`;

            const commentBody = { text: htmlContent };

            try {
              const response = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${auth}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify(commentBody)
              });

              if (!response.ok) throw new Error(`ADO API Error: ${response.status}`);
              console.log("Successfully updated ADO Release Item.");
            } catch (err) {
              core.setFailed(`Failed to update ADO: ${err.message}`);
            }
      - name: Sync to Azure DevOps
        if: success()
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG_URL: ${{ secrets.ADO_ORG_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = "${{ github.event.inputs.release_id }}";
            const summary = process.env.AI_SUMMARY;
            const orgUrl = process.env.ADO_ORG_URL;
            const pat = process.env.ADO_PAT;
            const auth = Buffer.from(`:${pat}`).toString('base64');
            
            const commentBody = {
              text: `### Deployment Successful\n\n**Environment:** ${{ github.event.inputs.target_env }}\n**Triggered By:** ${context.actor}\n\n**AI Summary of Changes:**\n${summary}\n\n*View deployment in [GitHub Actions](${context.payload.repository.html_url}/actions/runs/${context.runId})*`
            };

            try {
              const response = await fetch(`${orgUrl}/_apis/wit/workitems/${releaseId}/comments?api-version=7.0-preview.3`, {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${auth}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify(commentBody)
              });

              if (!response.ok) throw new Error(`ADO API Error: ${response.status}`);
              console.log("Successfully updated ADO Release Item.");
            } catch (err) {
              core.setFailed(`Failed to update ADO: ${err.message}`);
            }
