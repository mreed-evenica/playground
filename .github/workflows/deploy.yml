name: Manual Release

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'ADO Release Work Item ID (e.g., 456)'
        required: true
      target_env:
        description: 'Target Environment'
        type: choice
        options: [Production, Staging]
        default: 'Production'

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy:
    name: Deploy and Summarize
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Generate AI Release Summary
        id: ai
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Get the data but keep it structured
          gh pr list --state merged --limit 3 --json title,body --template '{{range .}}PR: {{.title}} | Description: {{.body}} {{end}}' > context.txt
          
          echo "Sending context to Copilot via STDIN..."

          # 2. Use a PIPE. This bypasses the shell's argument parser entirely.
          # We use 'explain' which is designed to take the prompt and then wait for input.
          RAW_OUTPUT=$(cat context.txt | gh copilot -p "Summarize these changes into 3 professional bullet points for a project manager.") || echo "AI Summary failed"

          # 3. Clean the terminal metadata
          CLEAN_SUMMARY=$(echo "$RAW_OUTPUT" | grep -v "installed successfully" | grep -v "Checking for updates" | sed '/^$/d')

          # 4. Final Fail-Safe: If AI is silent, we manually bullet the titles
          if [ -z "$CLEAN_SUMMARY" ] || [[ "$CLEAN_SUMMARY" == *"failed"* ]]; then
             echo "AI was silent, creating manual summary from titles..."
             CLEAN_SUMMARY=$(gh pr list --state merged --limit 3 --json title --template '{{range .}}* {{.title}}{{"\n"}}{{end}}')
          fi

          {
            echo 'AI_SUMMARY<<EOF'
            echo "$CLEAN_SUMMARY"
            echo 'EOF'
          } >> "$GITHUB_ENV"
      - name: Sync to Azure DevOps
        if: success()
        env:
          AI_SUMMARY: ${{ env.AI_SUMMARY }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG_URL: ${{ secrets.ADO_ORG_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = "${{ github.event.inputs.release_id }}";
            const summary = process.env.AI_SUMMARY || "No summary available.";
            const orgUrl = process.env.ADO_ORG_URL;
            const pat = process.env.ADO_PAT;
            const auth = Buffer.from(`:${pat}`).toString('base64');
            
            const cleanOrgUrl = orgUrl.replace(/\/$/, "");
            const apiUrl = `${cleanOrgUrl}/_apis/wit/workitems/${releaseId}/comments?api-version=7.0-preview.3`;
            
            const htmlContent = `<div>
              <h3 style="color: #0078d4; margin-bottom: 5px;">Deployment Successful</h3>
              <p style="margin-top: 0;"><b>Environment:</b> Production<br>
              <b>Triggered By:</b> ${context.actor}</p>
              <p><b>AI Summary of Changes:</b><br>
              ${summary.replace(/\n/g, '<br>')}</p>
              <hr style="border: 0; border-top: 1px solid #eee;">
              <p style="font-size: 11px; color: #666;">View deployment in <a href="${context.payload.repository.html_url}/actions/runs/${context.runId}">GitHub Actions</a></p>
            </div>`;

            try {
              await fetch(apiUrl, {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${auth}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text: htmlContent })
              });
              console.log("Successfully updated ADO.");
            } catch (err) {
              console.error("Failed to update ADO:", err.message);
            }
