name: Manual Release

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'ADO Release Work Item ID (e.g., 456)'
        required: true
      target_env:
        description: 'Target Environment'
        type: choice
        options: [Production, Staging]
        default: 'Production'

permissions:
  contents: read
  pull-requests: read

jobs:
  deploy:
    name: Deploy and Summarize
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 1. Ensure the binary is installed
      - name: Install GitHub Copilot CLI
        run: npm i -g @github/copilot

      # 2. Run with the "Agentic" Configuration
      - name: Generate AI Release Summary
        id: ai
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_RELEASE_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # THIS IS THE FIX: Tell Linux to handle special characters (bullets/emojis)
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
        run: |
          set -euo pipefail
          
          # 1. Gather context
          PR_DATA=$(gh pr list --state merged --limit 3 --json title --template '{{range .}}{{.title}}, {{end}}')
          
          echo "Launching Autopilot Agent..."

          # 2. Run the command exactly as you did locally
          # We capture EVERYTHING to a file first to avoid shell pipe issues
          copilot -p "Summarize these PRs into 3 professional bullets: $PR_DATA" --autopilot --allow-all-tools --no-auto-update > raw_output.txt 2>&1 || true

          # 3. Use a safer 'awk' parser instead of 'grep' 
          # This looks for the actual summary lines and ignores the 'Thinking' logs
          CLEAN_SUMMARY=$(awk '/^[*•-]/ {print}' raw_output.txt | head -n 5)

          # 4. Final Fail-safe
          if [ -z "$CLEAN_SUMMARY" ]; then
             echo "AI output parsing failed, using raw data fallback."
             CLEAN_SUMMARY="• Successfully deployed: $PR_DATA"
          fi

          {
            echo 'AI_SUMMARY<<EOF'
            echo "$CLEAN_SUMMARY"
            echo 'EOF'
          } >> "$GITHUB_ENV"
      - name: Sync to Azure DevOps
        if: success()
        env:
          AI_SUMMARY: ${{ env.AI_SUMMARY }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG_URL: ${{ secrets.ADO_ORG_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = "${{ github.event.inputs.release_id }}";
            const summary = process.env.AI_SUMMARY || "No summary available.";
            const orgUrl = process.env.ADO_ORG_URL;
            const pat = process.env.ADO_PAT;
            const auth = Buffer.from(`:${pat}`).toString('base64');
            
            const cleanOrgUrl = orgUrl.replace(/\/$/, "");
            const apiUrl = `${cleanOrgUrl}/_apis/wit/workitems/${releaseId}/comments?api-version=7.0-preview.3`;
            
            const htmlContent = `<div>
              <h3 style="color: #0078d4; margin-bottom: 5px;">Deployment Successful</h3>
              <p style="margin-top: 0;"><b>Environment:</b> Production<br>
              <b>Triggered By:</b> ${context.actor}</p>
              <p><b>AI Summary of Changes:</b><br>
              ${summary.replace(/\n/g, '<br>')}</p>
              <hr style="border: 0; border-top: 1px solid #eee;">
              <p style="font-size: 11px; color: #666;">View deployment in <a href="${context.payload.repository.html_url}/actions/runs/${context.runId}">GitHub Actions</a></p>
            </div>`;

            try {
              await fetch(apiUrl, {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${auth}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text: htmlContent })
              });
              console.log("Successfully updated ADO.");
            } catch (err) {
              console.error("Failed to update ADO:", err.message);
            }
