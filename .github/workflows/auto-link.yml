name: Auto-Link & Traceability

on:
  pull_request:
    # 'edited' catches changes to the description (Closes #123)
    types: [opened, edited, synchronized, reopened]
  # Allows you to manually click "Re-run" from the PR if you link via sidebar
  workflow_dispatch: 

permissions:
  pull-requests: write
  issues: read
  contents: read

jobs:
  link-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: "Link and Verify"
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = context.payload.pull_request.head.ref;
            const prNumber = context.payload.pull_request.number;
            let body = context.payload.pull_request.body || "";
            
            const match = branchName.match(/(?:^|\/|#)(\d+)/);
            
            if (match) {
              const issueId = match[1];
              try {
                // Verify issue exists
                await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueId,
                });

                // Auto-Link logic
                if (!body.includes(`#${issueId}`)) {
                  await github.rest.pulls.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    body: `Linked to Issue #${issueId}\n\n${body}`
                  });
                  console.log(`Auto-linked Issue #${issueId}. Waiting for GitHub to sync...`);
                  
                  // ⏳ THE FIX: Wait 3 seconds for GitHub to index the new link
                  await new Promise(r => setTimeout(r, 3000));
                }
              } catch (e) {
                core.setFailed(`❌ Issue #${issueId} doesn't exist.`);
                return;
              }
            }

            // Final Verification Check
            const query = `query($owner:String!, $name:String!, $number:Int!) {
              repository(owner: $owner, name: $name) {
                pullRequest(number: $number) {
                  closingIssuesReferences(first: 5) { totalCount }
                }
              }
            }`;
            
            const result = await github.graphql(query, {
              owner: context.repo.owner,
              name: context.repo.repo,
              number: prNumber
            });

            if (result.repository.pullRequest.closingIssuesReferences.totalCount === 0) {
               core.setFailed("❌ Link not detected yet. If you just linked it, please wait a moment and re-run this check.");
            } else {
              console.log("✅ Traceability Verified.");
            }

            // 3. Final Verification: Check for ANY formal links
            // We use GraphQL to check the 'Development' sidebar (closingIssuesReferences)
            const query = `query($owner:String!, $name:String!, $number:Int!) {
              repository(owner: $owner, name: $name) {
                pullRequest(number: $number) {
                  closingIssuesReferences(first: 5) { totalCount }
                }
              }
            }`;
            
            const result = await github.graphql(query, {
              owner: context.repo.owner,
              name: context.repo.repo,
              number: prNumber
            });

            const count = result.repository.pullRequest.closingIssuesReferences.totalCount;
            if (count === 0) {
              core.setFailed("❌ Traceability Failed: No valid issue linked. Please name your branch with the Issue ID or link via the Development sidebar.");
            } else {
              console.log(`✅ Traceability Verified: ${count} issue(s) linked.`);
            }
